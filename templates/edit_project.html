<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="brand">Task Manager</div>
            <a class="btn btn-secondary" href="/dashboard">Back to Dashboard</a>
        </header>

        <main class="container auth-card">
            <h2>Edit Project</h2>
            <p class="intro">Update project name and team members.</p>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" class="form-grid">
                <input type="text" name="name" placeholder="Project Name" value="{{ request.form.name or project.name }}" required>
                <textarea name="description" rows="4" placeholder="Project Description">{{ request.form.description or project.description or '' }}</textarea>

                <p class="small-text">Update project details here. Manage team members separately from the dashboard.</p>
                <button class="btn" type="submit">Save Project</button>
            </form>
        </main>
    </div>
</body>
</html>
