<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="brand">Task Manager</div>
            <a class="btn btn-secondary" href="/dashboard">Back to Dashboard</a>
        </header>

        <main class="container auth-card">
            <h2>Create Task</h2>
            <p class="intro">Enter the task name, optional description, choose a project, then assign to a team member.</p>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" class="form-grid">
                <input type="text" name="title" placeholder="Task Name" value="{{ title or '' }}" required>
                <textarea name="description" rows="4" placeholder="Task Description">{{ description or '' }}</textarea>

                <select name="project_id" id="project-select" required>
                    <option value="" disabled {% if not selected_project_id %}selected{% endif %}>Select project</option>
                    {% for p in projects %}
                        <option value="{{ p.id }}" {% if selected_project_id and selected_project_id|int == p.id %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>

                <select name="assigned_to" id="assigned-select" required disabled>
                    <option value="">Select a project first</option>
                </select>
                <p id="member-warning" class="small-text"></p>

                <input type="date" name="due_date" value="{{ due_date or '' }}">
                <button class="btn" type="submit" id="submit-task">Create Task</button>
            </form>
        </main>
    </div>

    <script>
        const projectMembers = {{ project_members_map | tojson }};
        const projectSelect = document.getElementById('project-select');
        const assignedSelect = document.getElementById('assigned-select');
        const warning = document.getElementById('member-warning');
        const submitButton = document.getElementById('submit-task');
        const selectedProjectId = '{{ selected_project_id or '' }}';
        const selectedAssigned = '{{ selected_assigned_to or '' }}';

        function updateAssignees() {
            const projectId = projectSelect.value;
            assignedSelect.innerHTML = '';
            warning.textContent = '';
            assignedSelect.disabled = true;
            submitButton.disabled = false;

            if (!projectId) {
                assignedSelect.innerHTML = '<option value="">Select a project first</option>';
                submitButton.disabled = true;
                return;
            }

            const members = projectMembers[projectId] || [];
            if (members.length === 0) {
                assignedSelect.innerHTML = '<option value="">There are no team members to assign the task. Please add team members and assign the task.</option>';
                warning.textContent = 'There are no team members to assign the task. Please add team members and assign the task.';
                submitButton.disabled = true;
                return;
            }

            assignedSelect.disabled = false;
            assignedSelect.innerHTML = '<option value="" disabled>Select assignee</option>';
            members.forEach(member => {
                const option = document.createElement('option');
                option.value = member.id;
                option.textContent = member.name;
                if (selectedAssigned === String(member.id)) {
                    option.selected = true;
                }
                assignedSelect.appendChild(option);
            });
        }

        projectSelect.addEventListener('change', updateAssignees);
        updateAssignees();
        if (selectedProjectId) {
            projectSelect.value = selectedProjectId;
            updateAssignees();
        }
    </script>
</body>
</html>"
